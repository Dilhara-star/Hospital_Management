<div class="table-responsive">
    <table class="table table-bordered table-hover" width="100%" cellspacing="0">
        <thead class="thead-light">
            <tr>
                <th>Medicine</th>
                <th>Dosage</th>
                <th>Quantity</th>
                <th>Instructions</th>
                <th class="text-center">Remove</th>
            </tr>
        </thead>
        <tbody>
            {% for item in prescribed_items %}
            <tr>
                <td class="font-weight-bold">{{ item.medicine.name }}</td>
                <td>{{ item.dosage }}</td>
                <td>{{ item.quantity }}</td>
                <td>{{ item.instructions|default:"—" }}</td>
                <td class="text-center">
                    <form method="post" class="pharmacy-remove-form"
                        action="{% url 'prescription_item_delete' appointment.pk item.pk %}">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-sm btn-danger">
                            <i class="fas fa-trash"></i>
                        </button>
                    </form>
                </td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="5" class="text-center text-muted py-4">No medicine prescribed yet.</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
